name: Weekly data refresh

# Re-researches Stege shop hours + market dates every Monday and, if anything
# changed, commits the new data.json (the TV app fetches it on next open).
on:
  schedule:
    - cron: "0 5 * * 1"   # Mondays 05:00 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Re-research + rewrite data.json
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MODEL: claude-sonnet-4-6
        run: python updater/refresh_via_api.py

      - name: Commit if changed
        run: |
          if git diff --quiet -- data.json; then
            echo "No changes."
          else
            git config user.name  "stege-status-bot"
            git config user.email "actions@users.noreply.github.com"
            git add data.json
            git commit -m "Weekly data refresh $(date +%F)"
            git push
          fi
